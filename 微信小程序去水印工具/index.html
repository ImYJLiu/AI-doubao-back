<!DOCTYPE html>

<html lang="zh-CN">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>AI去水印助手 - 首页</title>
<script src="https://modao.cc/agent-py/static/source/js/tailwindcss.3.4.3.js"></script>
<script src="https://modao.cc/agent-py/static/source/js/iconify-icon.min.1.0.7.js"></script>
<style>
        @font-face {
            font-family: 'PingFang';
            src: local('PingFang SC');
        }
        body {
            font-family: 'PingFang', sans-serif;
            background-color: #f7f7f7;
        }
        .safe-area-bottom {
            padding-bottom: env(safe-area-inset-bottom);
        }
    </style>
</head>
<body class="flex justify-center items-center h-screen bg-gray-200">
<!-- 模拟手机容器 -->
<div class="w-[375px] h-[812px] bg-white rounded-[40px] shadow-2xl overflow-hidden relative border-[8px] border-black flex flex-col">
<!-- 状态栏 -->
<div class="h-11 w-full flex justify-between items-center px-8 pt-4">
<span class="text-xs font-bold">09:41</span>
<div class="flex space-x-1">
<iconify-icon icon="mingcute:signal-line"></iconify-icon>
<iconify-icon icon="mingcute:wifi-line"></iconify-icon>
<iconify-icon icon="mingcute:battery-line"></iconify-icon>
</div>
</div>
<!-- 主内容区 (可滚动) -->
<div class="flex-1 overflow-y-auto px-6 pb-24">
<!-- 头部 -->
<div class="mt-8 flex justify-between items-start">
<div>
<h1 class="text-2xl font-bold text-gray-900">AI去水印助手</h1>
<p class="text-sm text-gray-500 mt-1">2026年度最受欢迎图像工具</p>
</div>
<div class="bg-green-50 px-3 py-1 rounded-full border border-green-100 flex items-center">
<iconify-icon class="text-green-600 mr-1" icon="solar:star-bold"></iconify-icon>
<span class="text-green-700 text-sm font-medium" id="credit-count">剩余 3 次</span>
</div>
</div>
<!-- Banner卡片 -->
<div class="mt-8 relative h-44 rounded-2xl overflow-hidden shadow-lg bg-gradient-to-br from-green-500 to-emerald-600">
<img alt="Feature banner" class="w-full h-full object-cover opacity-30" src="https://modao.cc/agent-py/media/generated_images/2026-04-11/c7990a0197564f538ff24f5dd23a0f3c.jpg"/>
<div class="absolute inset-0 p-6 flex flex-col justify-end text-white">
<h2 class="text-xl font-bold">智能擦除，不留痕迹</h2>
<p class="text-xs opacity-90 mt-1">采用 XXAI 2.0 修复算法，完美还原背景</p>
</div>
</div>
<!-- 核心功能入口 -->
<div class="mt-8 grid grid-cols-1 gap-4">
<a class="flex items-center p-4 bg-white border border-gray-100 rounded-2xl shadow-sm hover:shadow-md transition-shadow" href="upload.html">
<div class="w-12 h-12 bg-green-100 rounded-xl flex items-center justify-center text-green-600">
<iconify-icon class="text-2xl" icon="solar:camera-add-bold"></iconify-icon>
</div>
<div class="ml-4 flex-1">
<h3 class="font-bold text-gray-800">一键去水印</h3>
<p class="text-xs text-gray-500">支持涂抹、框选，毫秒级修复</p>
</div>
<iconify-icon class="text-gray-400" icon="solar:alt-arrow-right-linear"></iconify-icon>
</a>
<div class="flex items-center p-4 bg-white border border-gray-100 rounded-2xl shadow-sm opacity-60">
<div class="w-12 h-12 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600">
<iconify-icon class="text-2xl" icon="solar:video-library-bold"></iconify-icon>
</div>
<div class="ml-4 flex-1">
<h3 class="font-bold text-gray-800">短视频去水印</h3>
<p class="text-xs text-gray-500">即将上线，敬请期待</p>
</div>
<span class="text-[10px] bg-gray-100 text-gray-400 px-2 py-0.5 rounded">开发中</span>
</div>
</div>
<!-- 示例对比 -->
<div class="mt-8">
<h3 class="font-bold text-gray-800 mb-4">修复效果展示</h3>
<div class="grid grid-cols-2 gap-3">
<div class="rounded-xl overflow-hidden border border-gray-100">
<div class="relative h-28">
<img alt="Before" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-11/ad80ef0d37bd40c98971dbc6f370cf08.jpg"/>
<span class="absolute top-1 left-1 bg-black/50 text-white text-[8px] px-1.5 py-0.5 rounded">修改前</span>
</div>
</div>
<div class="rounded-xl overflow-hidden border border-gray-100">
<div class="relative h-28">
<img alt="After" class="w-full h-full object-cover" src="https://modao.cc/agent-py/media/generated_images/2026-04-11/6fbac6a1f15541ae966413992d40caa5.jpg"/>
<span class="absolute top-1 left-1 bg-green-500/80 text-white text-[8px] px-1.5 py-0.5 rounded">修改后</span>
</div>
</div>
</div>
</div>
</div>
<!-- 底部导航栏 -->
<div class="h-20 bg-white/80 backdrop-blur-md border-t border-gray-100 flex items-center justify-around px-4 safe-area-bottom absolute bottom-0 w-full">
<a class="flex flex-col items-center text-green-600" href="index.html">
<iconify-icon class="text-2xl" icon="solar:home-smile-bold"></iconify-icon>
<span class="text-[10px] mt-1 font-bold">首页</span>
</a>
<a class="flex flex-col items-center text-gray-400" href="history.html">
<iconify-icon class="text-2xl" icon="solar:gallery-linear"></iconify-icon>
<span class="text-[10px] mt-1">作品集</span>
</a>
<a class="flex flex-col items-center text-gray-400" href="rewards.html">
<iconify-icon class="text-2xl" icon="solar:gift-linear"></iconify-icon>
<span class="text-[10px] mt-1">领次数</span>
</a>
</div>
</div>
<script>
        // 初始化次数逻辑
        document.addEventListener('DOMContentLoaded', () => {
            let credits = localStorage.getItem('watermark_credits');
            if (credits === null) {
                localStorage.setItem('watermark_credits', '3');
                credits = '3';
            }
            document.getElementById('credit-count').innerText = `剩余 ${credits} 次`;
        });
    </script>
</body>
</html>
